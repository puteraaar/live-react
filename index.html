<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Panel - Wisuda ABBS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-6">
    
    <header class="text-center mb-8">
        <h1 class="text-2xl font-bold text-blue-400">Live Reaction Wisuda</h1>
        <p class="text-slate-400 text-sm">Ketuk untuk mengirim reaksi!</p>
    </header>

    <!-- Cooldown Indicator -->
    <div id="cooldown-bar" class="w-full max-w-xs bg-slate-800 h-1 mb-6 overflow-hidden">
        <div id="progress" class="bg-blue-500 h-full w-full transition-all duration-0"></div>
    </div>

    <!-- Emoji Grid -->
    <div class="grid grid-cols-4 gap-4 mb-10 w-full max-w-sm">
        <button onclick="send('emoji', '🎓')" class="btn-react text-4xl p-4 bg-slate-800 rounded-2xl active:scale-90 transition">🎓</button>
        <button onclick="send('emoji', '👏')" class="btn-react text-4xl p-4 bg-slate-800 rounded-2xl active:scale-90 transition">👏</button>
        <button onclick="send('emoji', '❤️')" class="btn-react text-4xl p-4 bg-slate-800 rounded-2xl active:scale-90 transition">❤️</button>
        <button onclick="send('emoji', '🔥')" class="btn-react text-4xl p-4 bg-slate-800 rounded-2xl active:scale-90 transition">🔥</button>
    </div>

    <!-- GIF Grid -->
    <div class="w-full max-w-sm">
        <h3 class="text-lg font-semibold mb-4 text-slate-300">Kirim GIF</h3>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="send('gif', 'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndm80Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/l41lTfhu899rXnOQU/giphy.gif')" class="btn-react overflow-hidden rounded-xl h-24 border-2 border-transparent active:border-blue-500">
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndm80Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/l41lTfhu899rXnOQU/giphy.gif" class="w-full h-full object-cover">
            </button>
            <button onclick="send('gif', 'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndm80Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKVUn7iM8FMEU24/giphy.gif')" class="btn-react overflow-hidden rounded-xl h-24 border-2 border-transparent active:border-blue-500">
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndm80Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKVUn7iM8FMEU24/giphy.gif" class="w-full h-full object-cover">
            </button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, query, limitToLast, onChildAdded } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

        // GANTI DENGAN CONFIG FIREBASE KAMU (Sama dengan di atas)
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
            apiKey: "AIzaSyBsfBEfdLZ2_mWsHrfiGQozx0WzZmQnXk8",
            authDomain: "live-reaction-63496.firebaseapp.com",
            databaseURL: "https://live-reaction-63496-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "live-reaction-63496",
            storageBucket: "live-reaction-63496.firebasestorage.app",
            messagingSenderId: "481124792209",
            appId: "1:481124792209:web:22c19c239471a443d94c30",
            measurementId: "G-937NMZTFCF"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const reactionsRef = ref(db, 'reactions');

        let canSend = true;
        const cooldownTime = 2500; // 2.5 detik

        window.send = function(type, value) {
            if (!canSend) return;

            // Push data ke Firebase
            push(reactionsRef, {
                type: type,
                value: value,
                timestamp: serverTimestamp()
            });

            // Throttle UI
            canSend = false;
            const progress = document.getElementById('progress');
            progress.style.transition = 'none';
            progress.style.width = '0%';
            
            setTimeout(() => {
                progress.style.transition = `width ${cooldownTime}ms linear`;
                progress.style.width = '100%';
            }, 10);

            setTimeout(() => { canSend = true; }, cooldownTime);
        };
    </script>
</body>
</html>
