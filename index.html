<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-6">
    
    <header class="text-center mb-8">
        <h1 class="text-2xl font-bold text-blue-400">Live Reaction Wisuda</h1>
    </header>

    <div class="grid grid-cols-4 gap-4 mb-10 w-full max-w-sm">
        <button onclick="send('emoji', '🎓')" class="btn-react text-4xl p-4 bg-slate-800 rounded-2xl active:scale-90 transition">🎓</button>
        <button onclick="send('emoji', '👏')" class="btn-react text-4xl p-4 bg-slate-800 rounded-2xl active:scale-90 transition">👏</button>
        <button onclick="send('emoji', '❤️')" class="btn-react text-4xl p-4 bg-slate-800 rounded-2xl active:scale-90 transition">❤️</button>
        <button onclick="send('emoji', '🔥')" class="btn-react text-4xl p-4 bg-slate-800 rounded-2xl active:scale-90 transition">🔥</button>
    </div>

    <script type="module">
        // Import inti Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        // Import khusus Database (Inilah yang tadi kurang)
        import { getDatabase, ref, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBsfBEfdLZ2_mWsHrfiGQozx0WzZmQnXk8",
            authDomain: "live-reaction-63496.firebaseapp.com",
            databaseURL: "https://live-reaction-63496-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "live-reaction-63496",
            storageBucket: "live-reaction-63496.firebasestorage.app",
            messagingSenderId: "481124792209",
            appId: "1:481124792209:web:22c19c239471a443d94c30",
            measurementId: "G-937NMZTFCF"
        };

        // Inisialisasi
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const reactionsRef = ref(db, 'reactions');

        // Daftarkan fungsi ke window agar bisa dipanggil onclick
        window.send = function(type, value) {
            push(reactionsRef, {
            type: type,
            value: value,
            timestamp: serverTimestamp()
            });
        };
        </script>
</body>
</html>
