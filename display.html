<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Display Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: transparent; overflow: hidden; height: 100vh; margin: 0; }
        .reaction-item {
            position: absolute;
            bottom: -150px;
            animation: floatUp 5s linear forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            10% { opacity: 1; transform: translateY(-100px) scale(1.2); }
            100% { transform: translateY(-110vh) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        // Import Database dengan fungsi pemantau (onChildAdded)
        import { getDatabase, ref, query, limitToLast, onChildAdded } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBsfBEfdLZ2_mWsHrfiGQozx0WzZmQnXk8",
            authDomain: "live-reaction-63496.firebaseapp.com",
            databaseURL: "https://live-reaction-63496-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "live-reaction-63496",
            storageBucket: "live-reaction-63496.firebasestorage.app",
            messagingSenderId: "481124792209",
            appId: "1:481124792209:web:22c19c239471a443d94c30",
            measurementId: "G-937NMZTFCF"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // Hanya ambil data terakhir agar tidak muncul tumpukan lama saat refresh
        const reactionsRef = query(ref(db, 'reactions'), limitToLast(1));
        const container = document.getElementById('container');

        onChildAdded(reactionsRef, (snapshot) => {
            const data = snapshot.val();
            
            // Fungsi pembuat elemen animasi
            const el = document.createElement('div');
            el.className = 'reaction-item';
            el.style.left = Math.random() * 85 + 'vw';

            if (data.type === 'emoji') {
                el.innerHTML = `<span class="text-7xl">${data.value}</span>`;
            } else {
                el.innerHTML = `<img src="${data.value}" class="w-48 rounded-2xl shadow-2xl border-4 border-white">`;
            }

            container.appendChild(el);
            setTimeout(() => el.remove(), 5500);
        });
        </script>
</body>
</html>
